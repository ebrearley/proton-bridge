services:
  proton-bridge:
    container_name: proton-bridge
    image: ericbrearley/proton-bridge:dev
    build:
      context: .
      dockerfile: bridge/Dockerfile
      args:
        BRIDGE_DEB_VERSION: ${BRIDGE_DEB_VERSION:-3.23.1-1}
    restart: unless-stopped
    ports:
      - "${PROTON_BRIDGE_IMAP_PORT:-1143}:143"
      - "${PROTON_BRIDGE_SMTP_PORT:-1025}:25"
    volumes:
      - proton_bridge_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/api/status"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  proton-bridge-ui:
    container_name: proton-bridge-ui
    image: ericbrearley/proton-bridge-ui:dev
    build:
      context: .
      dockerfile: bridge-ui/Dockerfile
    restart: unless-stopped
    ports:
      - "${PROTON_BRIDGE_UI_PORT:-3000}:3000"
    environment:
      BRIDGE_CONTROL_URL: ${BRIDGE_CONTROL_URL:-http://proton-bridge:8081}
    depends_on:
      proton-bridge:
        condition: service_healthy

volumes:
  proton_bridge_data:
